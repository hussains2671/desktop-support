# Development-specific Nginx Configuration
# This extends the main nginx.conf with dev-specific settings
# Used when ENVIRONMENT=dev

server {
    listen 443 ssl http2;
    server_name localhost myapp.local 127.0.0.1;
    
    # SSL Certificate paths for development (mkcert)
    ssl_certificate /etc/nginx/ssl/dev/localhost.pem;
    ssl_certificate_key /etc/nginx/ssl/dev/localhost-key.pem;
    
    # Allow self-signed certificates in dev (less strict)
    ssl_verify_client off;
    
    # Include main server block configuration
    include /etc/nginx/conf.d/main.conf;
}

# Additional server block for LAN access (if using IP or custom domain)
server {
    listen 443 ssl http2;
    server_name myapp.local *.local;
    
    # SSL Certificate for custom dev domain
    ssl_certificate /etc/nginx/ssl/dev/myapp.local.pem;
    ssl_certificate_key /etc/nginx/ssl/dev/myapp.local-key.pem;
    
    include /etc/nginx/conf.d/main.conf;
}

