# Production-specific Nginx Configuration
# This extends the main nginx.conf with production settings
# Used when ENVIRONMENT=prod

server {
    listen 443 ssl http2;
    server_name _;
    
    # SSL Certificate paths for production (Let's Encrypt)
    # These will be mounted from certbot volume
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Include main server block configuration
    include /etc/nginx/conf.d/main.conf;
}

# HTTP to HTTPS redirect (production)
server {
    listen 80;
    server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

